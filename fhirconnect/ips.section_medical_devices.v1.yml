grammar: FHIRConnect/v1.0.0
type: model
metadata:
  name: SECTION.adhoc.v1_medical_devices
  version: 0.0.1-alpha
spec:
  system: FHIR
  version: R4
  openEhrConfig:
    archetype: openEHR-EHR-SECTION.adhoc.v1
  fhirConfig:
    structureDefinition: http://hl7.org/fhir/StructureDefinition/BackboneElement

mappings:
  - name: "entry"
    with:
      fhir: "entry"
      openehr: "$reference/items[openEHR-EHR-EVALUATION.device_summary.v0]"
    reference:
      resourceType: "DeviceUseStatement"
      mappings:
        - name: "deviceSummary"
          with:
            fhir: "$fhirRoot"
            openehr: "$archetype/items[openEHR-EHR-EVALUATION.device_summary.v0]"
          slotArchetype: "EVALUATION.device_summary.v0"

  - name: "title"
    with:
      fhir: "$fhirRoot"
      openehr: "$composition"
    manual:
      - name: "manualTitle"
        fhir:
          - path: "title"
            value: "Medical Devices"

  - name: "code"
    with:
      fhir: "code.coding"
      openehr: "$composition"
    manual:
      - name: "manualSystem"
        fhir:
          - path: "system"
            value: "http://loinc.org"
      - name: "manualCode"
        fhir:
          - path: "code"
            value: "46264-8"
      - name: "manualDisplay"
        fhir:
          - path: "display"
            value: "History of medical device use"

  - name: "emptyReason"
    with:
      fhir: "emptyReason"
      openehr: "$archetype/items[openEHR-EHR-EVALUATION.absence.v2]"
    fhirCondition:
      targetRoot: "$resource"
      targetAttribute: "emptyReason.coding.code"
      operator: "not of"
      criteria: "nilknown"
    followedBy:
      mappings:
        - name: "text"
          with:
            fhir: "text"
            openehr: "data[at0001]/items[at0002]"
        - name: "reason"
          with:
            fhir: "coding"
            openehr: "$archetype"
          followedBy:
            mappings:
              - name: "code"
                with:
                  fhir: "display"
                  openehr: "data[at0001]/items[at0005]"
              - name: "manualEmptyResonCoding"
                with:
                  fhir: "$fhirRoot"
                  openehr: "$archetype"
                manual:
                  - name: "manualSystem"
                    fhir:
                      - path: "system"
                        value: "http://terminology.hl7.org/CodeSystem/list-empty-reason"
                  - name: "manualCode"
                    fhir:
                      - path: "code"
                        value: "unavailable"

  - name: "narrativeText"
    with:
      fhir: "text"
      openehr: "$composition"
    mappingCode: "generateNarrative(entry, deviceUseStatements)"
    unidirectional: "openehr->fhir"
