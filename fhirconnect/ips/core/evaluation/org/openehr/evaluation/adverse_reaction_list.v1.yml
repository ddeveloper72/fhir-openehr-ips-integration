grammar: FHIRConnect/v0.9.0
type: model
metadata:
  name: EVALUATION.adverse_reaction_risk.v2
  version: 0.0.1-alpha
spec:
  system: FHIR
  version: R4
  openEhrConfig:
    archetype: openEHR-EHR-EVALUATION.adverse_reaction_risk.v2
    revision: 1.4.1
  fhirConfig:
    structureDefinition: http://hl7.org/fhir/StructureDefinition/AllergyIntolerance

terminology:
  type: "local"
  conceptmap: "http://hl7.org/fhir/ConceptMap/adverse-reaction_list-fhirconnect"

mappings:
  - name: "substance"
    with:
      fhir: "$resource.code"
      openehr: "$archetype/data[at0001]/items[at0002]"

  - name: "activeInactive"
    with:
      fhir: "$resource.clinicalStatus"
      openehr: "$archetype"
    followedBy:
      mappings:
        - name: "activeInactiveAllergies"
          with:
            fhir: "coding"
            openehr: "data[at0001]/items[at0130]"

  - name: "verificationStatus"
    with:
      fhir: "$resource.verificationStatus"
      openehr: "$archetype"
    followedBy:
      mappings:
        - name: "verificationStatusAllergies"
          with:
            fhir: "coding"
            openehr: "data[at0001]/items[at0063]"

  - name: "criticality"
    with:
      fhir: "$resource.criticality"
      openehr: "$archetype/data[at0001]/items[at0101]"

  - name: "category"
    with:
      fhir: "$resource.category"
      openehr: "$archetype/data[at0001]/items[at0120]" # value has to match the one binded in FHIR (food, medication, environment, biologic), even though its DV_TEXT in openEHR
    terminology:
      type: "inline"
      mappings:
        - openehr:
            code: "Food"
          fhir:
            code: "food"
        - openehr:
            code: "Medication"
          fhir:
            code: "medication"
        - openehr:
            code: "Environment"
          fhir:
            code: "environment"
        - openehr:
            code: "Biologic"
          fhir:
            code: "biologic"

  - name: "lastOccurrence"
    with:
      fhir: "$resource.lastOccurrence"
      openehr: "$archetype/data[at0001]/items[at0117]"

  - name: "onsetDateTime"
    with:
      fhir: "$resource.onset.as(DateTime)"
      openehr: "$archetype/data[at0001]/items[at0133]"
    openehrCondition:
      targetRoot: "$archetype"
      targetAttribute: "data[at0001]/items[at0133]"
      operator: "type"
      criteria: "DV_DATE_TIME"

  - name: "onsetDuration"
    with:
      fhir: "$resource.onset.as(Age)"
      openehr: "$archetype/data[at0001]/items[at0133]"
    openehrCondition:
      targetRoot: "$archetype"
      targetAttribute: "data[at0001]/items[at0133]"
      operator: "type"
      criteria: "DV_DURATION"

  - name: "onsetIntervalPeriod"
    with:
      fhir: "$resource.onset.as(Period)"
      openehr: "$archetype/data[at0001]/items[at0133]"
    openehrCondition:
      targetRoot: "$archetype"
      targetAttribute: "data[at0001]/items[at0133]"
      operator: "type"
      criteria: "DV_INTERVAL<DV_DATE_TIME>"

  - name: "onsetIntervalRange"
    with:
      fhir: "$resource.onset.as(Range)"
      openehr: "$archetype/data[at0001]/items[at0133]"
    openehrCondition:
      targetRoot: "$archetype"
      targetAttribute: "data[at0001]/items[at0133]"
      operator: "type"
      criteria: "DV_INTERVAL<DV_DURATION>"

  - name: "onsetString"
    with:
      fhir: "$resource.onset.as(String)"
      openehr: "$archetype/data[at0001]/items[at0133]"
    openehrCondition:
      targetRoot: "$archetype"
      targetAttribute: "data[at0001]/items[at0133]"
      operator: "type"
      criteria: "DV_TEXT"

  - name: "reactionMechanism"
    with:
      fhir: "$resource.type"
      openehr: "$archetype/data[at0001]/items[at0058]"
    terminology:
      type: "inline"
      mappings:
        - openehr:
            code: "Allergy"
          fhir:
            code: "allergy"
        - openehr:
            code: "Intolerance"
          fhir:
            code: "intolerance"


  - name: "comment"
    with:
      fhir: "$resource.note.text"
      openehr: "$archetype/data[at0001]/items[at0006]"

  - name: "reaction"
    with:
      fhir: "$resource.reaction"
      openehr: "$archetype/data[at0001]/items[openEHR-EHR-CLUSTER.adverse_reaction_event.v1]"
    slotArchetype: "CLUSTER.adverse_reaction_event.v1"



