# Clinical evidence cluster model - used as slot in problem_diagnosis
# Maps FHIR Condition.evidence (BackboneElement) to openEHR clinical_evidence cluster
grammar: FHIRConnect/v1.0.0
type: model
metadata:
  name: CLUSTER.adverse_reaction_event.v1
  version: 0.0.1-alpha
spec:
  system: FHIR
  version: R4
  openEhrConfig:
    archetype: openEHR-EHR-CLUSTER.adverse_reaction_event.v1
    revision: 1.0.0
  fhirConfig:
    structureDefinition: http://hl7.org/fhir/StructureDefinition/BackboneElement

terminology:
  type: "local"
  conceptmap: "http://hl7.org/fhir/ConceptMap/adverse-reaction_event-fhirconnect"


mappings:
  - name: "substance"
    with:
      fhir: "$resource.substance"
      openehr: "$archetype/items[at0001]"

  - name: "manifestation"
    with:
      fhir: "$resource.manifestation"
      openehr: "$archetype/items[at0006]"

  - name: "description"
    with:
      fhir: "$resource.description"
      openehr: "$archetype/items[at0007]"

  - name: "onset"
    with:
      fhir: "$resource.onset"
      openehr: "$archetype/items[at0008]"

  - name: "severity"
    with:
      fhir: "$resource.severity"
      openehr: "$archetype/items[at0010]"

  - name: "exposure"
    with:
      fhir: "$resource.exposureRoute"
      openehr: "$archetype/items[at0017]"

  - name: "comment"
    with:
      fhir: "$resource.note.text"
      openehr: "$archetype/items[at0024]"
