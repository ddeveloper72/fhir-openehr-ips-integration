# Problem List NL context mapper
grammar: FHIRConnect/v0.0.1
type: context
metadata:
  name: health_summary.context
  version: 0.0.1-alpha
spec:
  system: FHIR
  version: R4

context:
  profile:
    url: "http://hl7.org/fhir/uv/ips/StructureDefinition/Composition-uv-ips"
    version: "2.0.0"
  template:
    id: "International Patient Summary"
  archetypes:
    - "COMPOSITION.health_summary.v1"
    - "SECTION.adhoc.v1_problem_list"
    - "SECTION.adhoc.v1_adverse_reaction_list"
    - "SECTION.adhoc.v1_medication_list"
    - "SECTION.adhoc.v1_medical_devices"
    - "EVALUATION.problem_diagnosis.v1"
    - "EVALUATION.adverse_reaction_risk.v2"
    - "EVALUATION.device_summary.v0"
    - "CLUSTER.clinical_evidence.v1"
    - "CLUSTER.problem_qualifier.v2"
    - "CLUSTER.adverse_reaction_event.v1"
    - "CLUSTER.device.v1"
  extensions:
    - "IPS_problem_diagnose"
    - "IPS_medical_devices"
  start: "COMPOSITION.health_summary.v1"